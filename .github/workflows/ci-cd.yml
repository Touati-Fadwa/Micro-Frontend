name: Frontend CI/CD with K3s Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bibliotheque-frontend
  NAMESPACE: bibliotheque
  APP_NAME: bibliotheque-frontend

jobs:
  build-and-test:
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: build/

    - name: Run tests
      run: npm test -- --coverage

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.MFSONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.MFSONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=Touati-Fadwa_Micro-Frontend
          -Dsonar.organization=touati-fadwa
          -Dsonar.sources=src
          -Dsonar.exclusions=**/*.test.tsx,**/*.test.ts,**/node_modules/**
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
          -Dsonar.branch.name=main

  build-and-push:
    needs: build-and-test
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver: docker
        install: true
    
    - name: Download Frontend Artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: build/
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:latest
          ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:latest
        cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:

    - name: Setup Kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.K3S_CONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config
        kubectl get nodes  # Vérification
        
    - name: Configure K3s Access
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        cluster-type: generic
        kubeconfig: ${{ secrets.K3S_CONFIG }}

    - name: Create namespace
      run: kubectl create ns ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy Application
      run: |
        kubectl apply -f - <<DEPLOYMENT
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${{ env.APP_NAME }}
          namespace: ${{ env.NAMESPACE }}
        spec:
          replicas: 2
          strategy:
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
          selector:
            matchLabels:
              app: ${{ env.APP_NAME }}
          template:
            metadata:
              labels:
                app: ${{ env.APP_NAME }}
            spec:
              containers:
              - name: frontend
                image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
                imagePullPolicy: Always
                ports:
                - containerPort: 80
                resources:
                  limits:
                    cpu: "0.5"
                    memory: "512Mi"
                  requests:
                    cpu: "0.2"
                    memory: "256Mi"
                readinessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 5
                livenessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 10
        DEPLOYMENT

        kubectl apply -f - <<SERVICE
        apiVersion: v1
        kind: Service
        metadata:
          name: ${{ env.APP_NAME }}-service
          namespace: ${{ env.NAMESPACE }}
        spec:
          type: NodePort
          ports:
          - port: 80
            targetPort: 80
          selector:
            app: ${{ env.APP_NAME }}
        SERVICE

    - name: Verify deployment
      run: |
        kubectl wait --for=condition=available \
          --timeout=300s \
          deployment/${{ env.APP_NAME }} \
          -n ${{ env.NAMESPACE }}
        
        echo "Application URL:"
        kubectl get svc ${{ env.APP_NAME }}-service -n ${{ env.NAMESPACE }} -o jsonpath='http://{.status.loadBalancer.ingress[0].ip}:{.spec.ports[0].nodePort}'

    - name: Rollback on failure
      if: failure()
      run: |
        kubectl rollout undo deployment/${{ env.APP_NAME }} -n ${{ env.NAMESPACE }}
        kubectl rollout status deployment/${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} --timeout=120s
        echo "Rollback completed to previous version"

  monitoring:
    needs: deploy
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Notify Datadog
      run: |
        curl -X POST "https://api.datadoghq.com/api/v1/events" \
        -H "Content-Type: application/json" \
        -H "DD-API-KEY: ${{ secrets.DATADOG_API_KEY }}" \
        -d @- << EOF
        {
          "title": "Frontend Deployment Success",
          "text": "Version ${{ github.sha }} deployed to K3s cluster",
          "tags": ["env:prod", "service:frontend", "commit:${{ github.sha }}"],
          "alert_type": "success"
        }
        EOF

    - name: Setup RUM Monitoring
      run: |
        kubectl create configmap datadog-rum-config \
          --from-literal=application-id=${{ secrets.DATADOG_APP_ID }} \
          --from-literal=client-token=${{ secrets.DATADOG_CLIENT_TOKEN }} \
          -n ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

  k9s-guide:
    needs: monitoring
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Guide pour travailler avec K9s sur K3s
      run: |
        echo "## Guide pour travailler avec K9s sur K3s"
        echo ""
        echo "1. Installer K9s: https://k9scli.io/"
        echo "2. Configurer K9s pour utiliser votre kubeconfig K3s:"
        echo "   export KUBECONFIG=/chemin/vers/votre/k3s.yaml"
        echo "3. Lancer K9s: k9s"
        echo ""
        echo "Commandes utiles dans K9s:"
        echo "- :deploy pour voir les déploiements"
        echo "- :svc pour voir les services"
        echo "- :pod pour voir les pods"
        echo "- Ctrl+d pour supprimer une ressource"
        echo "- Ctrl+k pour tuer un pod"
        echo "- d pour décrire une ressource"
        echo "- l pour voir les logs"
        echo ""
        echo "Pour accéder au frontend: http://IP_DU_NOEUD:30080"
