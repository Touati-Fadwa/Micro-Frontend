name: Frontend CI/CD with K3s Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/bibliotheque-frontend
  NAMESPACE: bibliotheque
  APP_NAME: bibliotheque-frontend
  K3S_NODE_PORT: 30080  # Port NodePort fixe si nécessaire

jobs:
  build-and-test:
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: build/

    - name: Run tests
      run: npm test -- --coverage
      

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.MFSONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.MFSONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=Touati-Fadwa_Micro-Frontend
          -Dsonar.organization=touati-fadwa
          -Dsonar.sources=src
          -Dsonar.exclusions=**/*.test.tsx,**/*.test.ts,**/node_modules/**
          -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
          -Dsonar.branch.name=main

  build-and-push:
    needs: build-and-test
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      with:
        driver: docker
        install: true
    
    - name: Download Frontend Artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: build/
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:latest
          ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:latest
        cache-to: type=inline
        labels: |
          org.opencontainers.image.source=${{ github.repositoryUrl }}
          org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Configure K3s Access
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.K3S_CONFIG }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config
        kubectl cluster-info
        kubectl get nodes


    - name: Create namespace
      run: |
        kubectl create ns ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
        kubectl label ns ${{ env.NAMESPACE }} env=prod  # Optionnel: étiquette le namespace

    - name: Deploy Application
      run: |
        # Déploiement avec stratégie RollingUpdate
        kubectl apply -f - <<DEPLOYMENT
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${{ env.APP_NAME }}
          namespace: ${{ env.NAMESPACE }}
          labels:
            app: ${{ env.APP_NAME }}
            version: "${{ github.sha }}"
        spec:
          replicas: 3
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
          selector:
            matchLabels:
              app: ${{ env.APP_NAME }}
          template:
            metadata:
              labels:
                app: ${{ env.APP_NAME }}
            spec:
              containers:
              - name: frontend
                image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
                imagePullPolicy: Always
                ports:
                - containerPort: 80
                resources:
                  limits:
                    cpu: "0.5"
                    memory: "512Mi"
                  requests:
                    cpu: "0.2"
                    memory: "256Mi"
                livenessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 3
                readinessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  successThreshold: 1
                  failureThreshold: 3
        DEPLOYMENT

        # Service avec NodePort optionnel
        kubectl apply -f - <<SERVICE
        apiVersion: v1
        kind: Service
        metadata:
          name: ${{ env.APP_NAME }}-service
          namespace: ${{ env.NAMESPACE }}
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: web
        spec:
          type: NodePort
          ports:
          - port: 80
            targetPort: 80
            $(if [ -n "$K3S_NODE_PORT" ]; then echo "nodePort: $K3S_NODE_PORT"; fi)
          selector:
            app: ${{ env.APP_NAME }}
        SERVICE

    - name: Verify deployment
      run: |
        # Vérification du déploiement
        kubectl wait --for=condition=available \
          --timeout=300s \
          deployment/${{ env.APP_NAME }} \
          -n ${{ env.NAMESPACE }}
        
        # Affichage des informations de déploiement
        echo "=== Deployment Status ==="
        kubectl get deploy -n ${{ env.NAMESPACE }}
        
        echo "=== Service Details ==="
        kubectl get svc -n ${{ env.NAMESPACE }}
        
        echo "=== Pods Status ==="
        kubectl get pods -n ${{ env.NAMESPACE }}
        
        # Génération de l'URL d'accès
        echo "Application accessible via:"
        NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
        NODE_PORT=$(kubectl get svc ${{ env.APP_NAME }}-service -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.ports[0].nodePort}')
        echo "http://$NODE_IP:$NODE_PORT"

    - name: Rollback on failure
      if: failure()
      run: |
        echo "!!! Deployment failed - Initiating rollback !!!"
        kubectl rollout undo deployment/${{ env.APP_NAME }} -n ${{ env.NAMESPACE }}
        kubectl rollout status deployment/${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} --timeout=120s
        echo "Rollback to previous version completed"
        exit 1  # Marque le job comme échoué

  monitoring:
    needs: deploy
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Notify Datadog
      run: |
        curl -X POST "https://api.datadoghq.com/api/v1/events" \
        -H "Content-Type: application/json" \
        -H "DD-API-KEY: ${{ secrets.DATADOG_API_KEY }}" \
        -d @- << EOF
        {
          "title": "Frontend Deployment Notification",
          "text": "New version ${{ github.sha }} deployed successfully to K3s cluster.\n\n- Namespace: ${{ env.NAMESPACE }}\n- Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}",
          "tags": ["env:production", "service:frontend", "deployment"],
          "alert_type": "success"
        }
        EOF

    - name: Setup RUM Monitoring
      run: |
        kubectl create configmap datadog-rum-config \
          --from-literal=applicationId=${{ secrets.DATADOG_APP_ID }} \
          --from-literal=clientToken=${{ secrets.DATADOG_CLIENT_TOKEN }} \
          --from-literal=env=production \
          -n ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

  k9s-guide:
    needs: monitoring
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Generate K9s Cheat Sheet
      run: |
        cat << EOF > K9s_Guide.md
        # K9s Management Guide for K3s

        ## Basic Commands
        - Connect to cluster: \`export KUBECONFIG=~/.kube/config\`
        - Launch K9s: \`k9s -n ${{ env.NAMESPACE }}\`

        ## Shortcuts
        | Key | Action                  |
        |-----|-------------------------|
        | d   | Describe resource       |
        | l   | View logs              |
        | e   | Edit resource          |
        | Ctrl+d | Delete resource     |
        | Ctrl+k | Kill pod           |

        ## Accessing Services
        Frontend URL: http://\$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'):${{ env.K3S_NODE_PORT }}

        ## Common Debugging
        \`\`\`bash
        # View failing pods
        kubectl get pods -n ${{ env.NAMESPACE }} --field-selector=status.phase!=Running
        
        # Check deployment status
        kubectl rollout status deployment/${{ env.APP_NAME }} -n ${{ env.NAMESPACE }}
        \`\`\`
        EOF
        
        echo "K9s guide generated as K9s_Guide.md"